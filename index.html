<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Material Visibility Tool</title>

    <script>
        // ✅ 你的 SharePoint data.js URL（必须是直链）
        const DATA_URL = "https://danfoss.sharepoint.com/sites/SalesSupport2/Material%20Visibility%20Troubleshooting%20Tool/data.js";

        function loadData(callback) {
            const script = document.createElement('script');

            // ✅ 防缓存（关键！保证每天更新生效）
            script.src = DATA_URL + "?v=" + new Date().getTime();

            script.onload = function () {
                console.log("✅ data.js loaded");
                callback();
            };

            script.onerror = function () {
                alert("❌ data.js加载失败，请检查SharePoint权限或链接");
            };

            document.head.appendChild(script);
        }

        function init() {
            loadData(function () {
                document.getElementById("status").innerText = "✅ 数据已加载";
            });
        }

        // ✅ 页面加载时自动执行
        window.onload = init;
    </script>
</head>

<body>
    <h2>Material Visibility Tool</h2>

    <p id="status">⏳ 数据加载中...</p>

    <br>

    Customer:
    <input type="text" id="customer">

    <br><br>

    Materials (one per line):
    <br>
    <textarea id="materials" rows="6" cols="40"></textarea>

    <br><br>

    <button onclick="runCheck()">Check</button>
    <button onclick="clearAll()">Clear</button>

    <br><br>

    <table border="1" id="resultTable">
        <tr>
            <th>Material</th>
            <th>Result</th>
        </tr>
    </table>


    <script>
        function runCheck() {
            const customer = document.getElementById("customer").value.trim();
            const materials = document.getElementById("materials").value.trim().split("\n");

            const table = document.getElementById("resultTable");

            // 清空旧结果
            table.innerHTML = `
                <tr>
                    <th>Material</th>
                    <th>Result</th>
                </tr>
            `;

            materials.forEach(mat => {
                const row = table.insertRow();

                const cell1 = row.insertCell(0);
                const cell2 = row.insertCell(1);

                cell1.innerText = mat;

                try {
                    // ✅ 这里调用 data.js 中的数据结构
                    if (typeof checkMaterial === "function") {
                        cell2.innerText = checkMaterial(customer, mat);
                    } else {
                        cell2.innerText = "❌ data.js未正确加载";
                    }
                } catch (e) {
                    cell2.innerText = "❌ error";
                }
            });
        }

        function clearAll() {
            document.getElementById("customer").value = "";
            document.getElementById("materials").value = "";
            document.getElementById("status").innerText = "⏳ 数据加载中...";
        }
    </script>

</body>
</html>
