<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Material Visibility Tool</title>

<style>
body {
    font-family: Arial;
    background: #f5f6f8;
}
.container {
    width: 820px;
    margin: 40px auto;
    background: white;
    padding: 25px;
    border-radius: 10px;
}
.btn-primary {
    background: #ff66a3;
    color: white;
    padding: 10px 20px;
    border: none;
    border-radius: 5px;
}
.btn-secondary {
    background: #ccc;
    padding: 10px 20px;
    border: none;
    border-radius: 5px;
}
</style>

</head>

<body>

<div class="container">

<h2>🛒 物料商城可见性批量查询</h2>
<div style="color:gray;">Material Visibility Checker</div>

<div id="status">
⏳ 数据加载中...
</div>

<br>

<label>客户账号 Customer</label><br>
<input id="customer" style="width:100%">

<br><br>

<label>物料号（每行一个）</label><br>
<textarea id="materials" style="width:100%;height:120px;"></textarea>

<br><br>

<button class="btn-primary" onclick="runCheck()">查询 / Check</button>
<button class="btn-secondary" onclick="clearAll()">清空</button>

<table border="1" width="100%" id="result" style="margin-top:20px;">
<tr><th>Material</th><th>Result</th></tr>
</table>

</div>

<!-- ✅ ✅ ✅ 关键：直接引用（SharePoint同目录） -->
data.jsscript>

<script>
function init(){
    if(typeof checkMaterial === "function"){
        document.getElementById("status").innerText="✅ 数据已加载";
    }else{
        document.getElementById("status").innerText="❌ data.js 未加载";
    }
}

function runCheck(){
    const customer = document.getElementById("customer").value;
    const materials = document.getElementById("materials").value.split("\n");

    let table = document.getElementById("result");
    table.innerHTML = "<tr><th>Material</th><th>Result</th></tr>";

    materials.forEach(m=>{
        if(!m.trim()) return;
        let row = table.insertRow();
        row.insertCell(0).innerText = m;
        try{
            row.insertCell(1).innerText = checkMaterial(customer,m);
        }catch(e){
            row.insertCell(1).innerText = "error";
        }
    });
}

function clearAll(){
    document.getElementById("customer").value="";
    document.getElementById("materials").value="";
}
window.onload=init;
</script>

</body>
</html>
